<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Uniarp - Documentação do Time de Desenvolvimento</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação oficial do Grupo de Desenvolvimento Uniarp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Temas CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" title="light">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  
  <style>
    /* Ajuste para a logo */
    .sidebar .sidebar-nav img {
      max-width: 140px;
      height: auto;
      margin: 15px auto;
      display: block;
    }
    
    /* Estilos customizados para o alternador de tema */
    #docsify-darklight-theme {
      right: 20px;
      bottom: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="app">Carregando documentação...</div>
  <script>
    window.$docsify = {
      name: 'Uniarp Dev',
      logo: 'assets/logo/logo.png',
      repo: 'uniarpdev/team-docs',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      // Configuração do Tema Escuro
      darklightTheme: {
        siteFont: "PT Sans",
        defaultTheme: 'system',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '15px',
        dark: {
          accent: '#42b983',
          toogleBackground: '#ffffff',
          background: '#1c2022',
          textColor: '#b4b4b4',
        },
        light: {
          accent: '#42b983',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
        }
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nenhum resultado encontrado!',
        depth: 6
      }
    }
  </script>
  
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugin Dark/Light Theme -->
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
  
  <!-- Plugins Adicionais -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
