<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Uniarp - Documentação do Time de Desenvolvimento</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação oficial do Grupo de Desenvolvimento Uniarp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="assets/logo/favicon.png" type="image/png">
  
  <!-- Temas CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" title="light">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  
  <style>
    /* Estilo para Logo | Nome do Projeto */
    .sidebar .app-name {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--theme-color, #42b983);
      text-decoration: none;
      margin-bottom: 20px;
    }
    
    .sidebar .app-name img {
      height: 30px; /* Logo um pouco menor para caber o texto ao lado */
      width: auto;
      margin-right: 10px;
      display: inline-block;
    }
    
    .sidebar .app-name::after {
      content: '| Uniarp Dev';
      margin-left: 5px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      white-space: nowrap;
      color: #000000; /* Cor preta conforme solicitado */
    }

    /* Esconde a logo padrão do docsify para usarmos o nosso layout customizado */
    .sidebar .sidebar-nav img {
      display: none;
    }
    
    /* Estilos customizados para o alternador de tema */
    #docsify-darklight-theme {
      right: 20px;
      bottom: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="app">Carregando documentação...</div>
  <script>
    window.$docsify = {
      name: 'Uniarp Dev',
      logo: 'assets/logo/logo.png',
      repo: 'uniarpdev/team-docs',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      // Configuração do Tema Escuro
      darklightTheme: {
        siteFont: "PT Sans",
        defaultTheme: 'system',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '15px',
        dark: {
          accent: '#42b983',
          toogleBackground: '#ffffff',
          background: '#1c2022',
          textColor: '#b4b4b4',
        },
        light: {
          accent: '#42b983',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
        }
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nenhum resultado encontrado!',
        depth: 6
      }
    }
  </script>
  
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugin Dark/Light Theme -->
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
  
  <!-- Plugins Adicionais -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
