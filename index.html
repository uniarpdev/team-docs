<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Uniarp - Documentação do Time de Desenvolvimento</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação oficial do Grupo de Desenvolvimento Uniarp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Favicon oficial da Uniarp -->
  <link rel="shortcut icon" href="assets/logo/favicon.png" type="image/x-icon">
  <link rel="icon" href="assets/logo/favicon.png" type="image/png">
  
  <!-- Tema Claro Padrão (Vue) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Estilo customizado para Logo | Nome do Projeto na Sidebar */
    .sidebar .app-name {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      margin-bottom: 25px;
      color: #000;
    }
    
    .sidebar .app-name img {
      height: 35px;
      width: auto;
      margin-right: 8px;
    }
    
    .sidebar .app-name::after {
      content: '| Uniarp Dev';
      margin-left: 3px;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      white-space: nowrap;
      color: #333;
    }

    /* Esconde a logo duplicada na navegação */
    .sidebar-nav > img {
      display: none;
    }
    
    /* Melhora o espaçamento da busca */
    .search {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando documentação...</div>
  <script>
    window.$docsify = {
      name: 'Uniarp Dev',
      logo: 'assets/logo/logo.png',
      repo: 'uniarpdev/team-docs',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nenhum resultado encontrado!',
        depth: 6
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Próximo',
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Erro',
        successText: 'Copiado'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
